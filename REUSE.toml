# reuse.toml - Configuration for REUSE tool

version = 1

[[annotations]]
path = "LICENSE"
precedence = "override"
SPDX-FileCopyrightText = "2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

# All source files in the project
[[annotations]]
path = "cmd/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "internal/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "pkg/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "scripts/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "docs/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "docker/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = ".github/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

# files by pattern
[[annotations]]
path = "**/*.md"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/*.yaml"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/*.yml"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/*.sh"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/Makefile"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/*.toml"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/*.json"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/.dockerignore"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/.gitignore"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "**/.golangci.yml"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

[[annotations]]
path = "go.mod"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026 ArcheBase"
SPDX-License-Identifier = "MulanPSL-2.0"

# go.sum is auto-generated by Go, contains third-party dependency hashes
[[annotations]]
path = "go.sum"
precedence = "override"
SPDX-FileCopyrightText = "NO-COPYRIGHT"
SPDX-License-Identifier = "CC0-1.0"

# Ignore build directories and generated files
[[annotations]]
path = "bin/**"
SPDX-FileCopyrightText = "NO-COPYRIGHT"
SPDX-License-Identifier = "NO-COPYRIGHT"

[[annotations]]
path = "**/*.out"
SPDX-FileCopyrightText = "NO-COPYRIGHT"
SPDX-License-Identifier = "NO-COPYRIGHT"

# Ignore test results and coverage
[[annotations]]
path = "test-results.log"
SPDX-FileCopyrightText = "NO-COPYRIGHT"
SPDX-License-Identifier = "NO-COPYRIGHT"

[[annotations]]
path = "coverage.out"
SPDX-FileCopyrightText = "NO-COPYRIGHT"
SPDX-License-Identifier = "NO-COPYRIGHT"
